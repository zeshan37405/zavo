name: One-time Zavo URL migration

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Replace old GitHub Pages URLs
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import subprocess

          old = "https://zeshan37405.github.io/smart-gadget-site"
          new = "https://zeshan37405.github.io/zavo"

          tracked = subprocess.check_output(["git", "ls-files", "-z"]).split(b"\0")
          changed = []
          for raw in tracked:
              if not raw:
                  continue
              path = Path(raw.decode("utf-8"))
              if path.as_posix() == ".github/workflows/migrate-zavo-url.yml":
                  continue
              try:
                  text = path.read_text(encoding="utf-8")
              except (UnicodeDecodeError, OSError):
                  continue
              updated = text.replace(old, new)
              if updated != text:
                  path.write_text(updated, encoding="utf-8")
                  changed.append(path.as_posix())

          Path(".github/workflows/migrate-zavo-url.yml").unlink(missing_ok=True)
          print("Updated files:")
          for item in changed:
              print(f"- {item}")
          PY

      - name: Commit migration
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No URL changes were needed."
            exit 0
          fi
          git commit -m "Migrate site URLs to /zavo/"
          git push
